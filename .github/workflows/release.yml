name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="$(cat VERSION)"
          expected="v${version}"
          if [[ "$tag" != "$expected" ]]; then
            echo "Release tag $tag does not match VERSION $version; expected $expected" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out release tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "${{ steps.release.outputs.tag }}"

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Vet
        run: make lint

      - name: Build Linux archives
        run: make release-artifacts

      - name: Build server packages
        run: make server-package-all-arch

      - name: Build Android debug APK
        run: make android-docker-build

      - name: Run Android unit tests
        run: make android-docker-test

      - name: Collect release artifacts
        run: |
          mkdir -p dist/github-release
          cp dist/release/*.tar.gz dist/github-release/
          cp dist/packages/*.deb dist/github-release/
          cp dist/packages/*.rpm dist/github-release/
          cp android-client/app/build/outputs/apk/debug/app-debug.apk "dist/github-release/s3s5_${{ steps.release.outputs.version }}_android_debug.apk"
          (cd dist/github-release && sha256sum * > SHA256SUMS)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: s3s5 ${{ steps.release.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/github-release/*
