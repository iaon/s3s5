name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Vet
        run: make lint

  packages:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7
      - name: Build server packages
        run: make server-package
      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: s3s5-server-packages
          path: dist/packages/*
