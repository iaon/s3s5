name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private object keys, payload dumps, or credentials.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible case.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Linux client
        - Linux server
        - Android client
        - S3-compatible object store
        - Protocol/crypto
        - Packaging
        - Documentation
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact credentials, bucket names if private, and payload data.
      render: text
